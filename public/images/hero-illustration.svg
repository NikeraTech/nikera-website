<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" role="img" aria-label="Hero illustration">
  <defs>
    <linearGradient id="lg1" x1="0" x2="1">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b" />
      <feBlend in="SourceGraphic" in2="b" mode="screen" />
    </filter>
  </defs>

  <rect width="100%" height="100%" rx="28" fill="#021827" />

  <!-- Abstract device panels -->
  <g transform="translate(80,60)">
    <rect x="0" y="0" width="280" height="180" rx="20" fill="#05232e" />
    <rect x="340" y="20" width="320" height="160" rx="18" fill="#042733" />

    <!-- soft gradient panel -->
    <rect x="60" y="220" width="540" height="200" rx="20" fill="url(#lg1)" opacity="0.12" filter="url(#soft)" />

    <!-- accent circles -->
    <g>
      <circle cx="520" cy="60" r="28" fill="#06b6d4" opacity="0.95">
        <animate attributeName="cy" dur="6s" values="60;42;60" repeatCount="indefinite" />
      </circle>
      <circle cx="420" cy="30" r="10" fill="#60a5fa" opacity="0.95" />
      <circle cx="180" cy="40" r="8" fill="#34d399" opacity="0.95" />
    </g>

    <!-- UI hints -->
    <g transform="translate(18,18)">
      <rect x="12" y="12" width="80" height="10" rx="6" fill="#0ea5a4" />
      <rect x="12" y="36" width="130" height="10" rx="6" fill="#60a5fa" />
    </g>

    <!-- small card -->
    <g transform="translate(400,260)">
      <rect x="0" y="0" width="160" height="86" rx="12" fill="#071125" stroke="#0ea5a4" stroke-opacity="0.06" />
      <text x="16" y="44" fill="#ffffff" font-size="14" font-family="Inter, system-ui" font-weight="600">AI Insights</text>
    </g>
  </g>

  <!-- decorative wave -->
  <path d="M0 380 C160 320 320 460 480 420 C640 380 800 460 800 460 L800 520 L0 520 Z" fill="#01121a" opacity="0.6" />

  <!-- Accessibility: reduced motion respects prefers-reduced-motion -->
  <style>
    @media (prefers-reduced-motion: reduce) {
      circle[animate], animate { animation: none !important; }
    }
  </style>
</svg>